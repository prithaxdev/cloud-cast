<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Cloud Cast — Real-Time Weather Dashboard</title>
    <meta name="description" content="Cloud Cast is a free, real-time weather dashboard with hourly and 7-day forecasts, interactive charts, location maps, and light/dark theming. No sign-up required." />
    <meta name="keywords" content="weather dashboard, weather forecast, hourly forecast, 7-day forecast, weather app, real-time weather, temperature, precipitation, wind speed, UV index" />
    <meta name="author" content="Cloud Cast" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://cloudcast-app.vercel.app/" />

    <!-- Theme -->
    <meta name="theme-color" content="#FF6900" />
    <meta name="color-scheme" content="light dark" />
    <meta name="msapplication-TileColor" content="#FF6900" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Cloud Cast" />
    <meta property="og:title" content="Cloud Cast — Real-Time Weather Dashboard" />
    <meta property="og:description" content="Free real-time weather dashboard with hourly and 7-day forecasts, interactive charts, location maps, and light/dark theming. No sign-up required." />
    <meta property="og:url" content="https://cloudcast-app.vercel.app/" />
    <meta property="og:image" content="https://cloudcast-app.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Cloud Cast weather dashboard showing current conditions, forecast charts, and location map" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Cloud Cast — Real-Time Weather Dashboard" />
    <meta name="twitter:description" content="Free real-time weather dashboard with hourly and 7-day forecasts, interactive charts, and location maps." />
    <meta name="twitter:image" content="https://cloudcast-app.vercel.app/og-image.png" />
    <meta name="twitter:image:alt" content="Cloud Cast weather dashboard" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- JSON-LD: WebApplication structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Cloud Cast",
      "url": "https://cloudcast-app.vercel.app/",
      "description": "Real-time weather dashboard with hourly and 7-day forecasts, interactive charts, location maps, and light/dark theming. No sign-up required.",
      "applicationCategory": "WeatherApplication",
      "operatingSystem": "Web",
      "browserRequirements": "Requires JavaScript. Requires a modern browser.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Real-time current weather conditions",
        "7-day daily forecast",
        "24-hour hourly forecast",
        "48-hour interactive weather charts",
        "Interactive location map",
        "Browser geolocation support",
        "Location search with geocoding",
        "Celsius and Fahrenheit unit toggle",
        "Light, dark, and system theme modes"
      ],
      "screenshot": "https://cloudcast-app.vercel.app/og-image.png",
      "inLanguage": "en",
      "isAccessibleForFree": true
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
